<!DOCTYPE html>
<html>
<head>
<title>Async Weather Tracker</title>

<style>

body{
    font-family: Arial;
    background:#1e2a55;
    color:white;
    text-align:center;
}

.container{
    width:80%;
    margin:auto;
    margin-top:30px;
}

.box{
    background:white;
    color:black;
    padding:20px;
    margin-top:20px;
    border-radius:6px;
}

input{
    padding:8px;
    width:200px;
}

button{
    padding:8px 15px;
    background:orange;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#ff8c00;
}

#weather p{
    margin:5px;
}

#history span{
    background:#eee;
    padding:5px 10px;
    margin:5px;
    display:inline-block;
    cursor:pointer;
    border-radius:4px;
}

#console{
    background:#0d1b40;
    color:#00ff9d;
    padding:10px;
    height:120px;
    overflow:auto;
    text-align:left;
}

</style>

</head>

<body>

<h2>Async Weather Tracker</h2>

<div class="container">

<div class="box">

<h3>Search City</h3>

<input type="text" id="city" placeholder="Enter city">
<button id="searchBtn">Search</button>

</div>

<div class="box">

<h3>Weather Details</h3>

<div id="weather">

<p id="cityName"></p>
<p id="temp"></p>
<p id="condition"></p>
<p id="humidity"></p>
<p id="wind"></p>

</div>

</div>

<div class="box">

<h3>Previous Searches</h3>

<div id="history"></div>

</div>

<div class="box">

<h3>Async Console Logs</h3>

<div id="console"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
